// ─── HELPERS ───────────────────────────────────────────────────────────────────
const useTime = () => {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  return time;
};
const fmtTime = (sec) => {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};
const getGreeting = () => {
  const h = new Date().getHours();
  if (h < 5) return "Still up?"; if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon"; if (h < 21) return "Good evening";
  return "Good night";
};
const getDifficultyColor = (d) => d === 'Easy' ? 'tag-green' : d === 'Medium' ? 'tag-amber' : 'tag-red';
const getCategoryTag = (c) => c === 'Air Fryer' ? 'tag-blue' : c === 'Baking' ? 'tag-purple' : c === 'Egyptian' ? 'tag-orange' : 'tag-amber';

// ─── TIMER CARD ────────────────────────────────────────────────────────────────
const TimerCard = ({ timer, onDelete }) => {
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);
  const [timeLeft, setTimeLeft] = useState(timer.secs);
  useEffect(() => {
    if (running && timeLeft > 0) { intervalRef.current = setInterval(() => setTimeLeft(t => t > 0 ? t - 1 : 0), 1000); }
    else { clearInterval(intervalRef.current); }
    if (timeLeft === 0 && running) setRunning(false);
    return () => clearInterval(intervalRef.current);
  }, [running, timeLeft]);
  const total = timer.secs, progress = total > 0 ? (timeLeft / total) : 0;
  const R = 54, C = 2 * Math.PI * R, pct = progress * C, done = timeLeft === 0;
  return (
    <div className="card" style={{ padding: '20px', animation: 'fadeIn 0.3s ease', border: done ? '1px solid rgba(249,115,22,0.4)' : '1px solid var(--border)', boxShadow: done ? '0 0 24px rgba(249,115,22,0.2)' : 'none' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div><div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'var(--font-display)' }}>{timer.name}</div><div style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: 'var(--font-display)', marginTop: 2 }}>{timer.preset || 'Custom timer'}</div></div>
        <button className="btn-icon" style={{ padding: 8 }} onClick={onDelete}><Icon name="x" size={14}/></button>
      </div>
      <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
        <div className="timer-ring" style={{ width: 128, height: 128 }}>
          <svg width="128" height="128" viewBox="0 0 128 128">
            <circle cx="64" cy="64" r={R} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
            <circle cx="64" cy="64" r={R} fill="none" stroke={done ? 'var(--accent-orange)' : 'var(--accent-amber)'} strokeWidth="8" strokeLinecap="round" strokeDasharray={`${pct} ${C}`} style={{ transition: 'stroke-dasharray 0.5s ease', filter: done ? 'drop-shadow(0 0 8px rgba(249,115,22,0.6))' : 'none' }}/>
          </svg>
          <div className="timer-ring-text"><div style={{ fontSize: 22, fontWeight: 700, color: done ? 'var(--accent-orange)' : 'var(--text-primary)', fontFamily: 'var(--font-mono)', animation: done ? 'pulse 1s infinite' : 'none' }}>{done ? '✓' : fmtTime(timeLeft)}</div>{!done && <div style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--font-display)' }}>{running ? 'running' : 'paused'}</div>}</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <button className={`btn ${done ? 'btn-ghost' : 'btn-primary'}`} style={{ flex: 1, padding: '12px' }} onClick={() => { if (done) { setTimeLeft(timer.secs); setRunning(false); } else setRunning(r => !r); }}>
          {done ? <><Icon name="refresh" size={16}/> Reset</> : running ? <><Icon name="pause" size={16}/> Pause</> : <><Icon name="play" size={16}/> Start</>}
        </button>
        {!done && <button className="btn btn-ghost" style={{ padding: '12px 14px' }} onClick={() => { setTimeLeft(timer.secs); setRunning(false); }}><Icon name="refresh" size={16}/></button>}
      </div>
    </div>
  );
};

// ─── COOKING MODE (with auto-advance) ─────────────────────────────────────────
const CookingMode = ({ recipe, onExit, lang, t }) => {
  const [step, setStep] = useState(0);
  const [timeLeft, setTimeLeft] = useState(null);
  const [timerRunning, setTimerRunning] = useState(false);
  const [justFinished, setJustFinished] = useState(false);
  const intervalRef = useRef(null);
  const current = recipe.steps[step];
  const total = recipe.steps.length;

  useEffect(() => {
    setTimeLeft(current.timer > 0 ? current.timer : null);
    setTimerRunning(false);
    setJustFinished(false);
    clearInterval(intervalRef.current);
  }, [step]);

  useEffect(() => {
    if (timerRunning && timeLeft > 0) {
      intervalRef.current = setInterval(() => setTimeLeft(t => { if (t <= 1) { clearInterval(intervalRef.current); setTimerRunning(false); setJustFinished(true); return 0; } return t - 1; }), 1000);
    } else { clearInterval(intervalRef.current); }
    return () => clearInterval(intervalRef.current);
  }, [timerRunning, timeLeft]);

  const progress = (step / total) * 100;

  return (
    <div style={{ position: 'fixed', inset: 0, background: '#0a0c10', zIndex: 200, display: 'flex', flexDirection: 'column', animation: 'fadeIn 0.3s ease' }}>
      <div style={{ padding: '20px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid var(--border)' }}>
        <button className="btn btn-ghost" onClick={onExit} style={{ padding: '10px 16px' }}><Icon name="x" size={16}/> {t('exit', 'common')}</button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, color: 'var(--text-primary)', fontSize: 16 }}>{recipe.name}</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--accent-orange)', marginTop: 2 }}>Step {step + 1} of {total}</div>
        </div>
        <div style={{ width: 100 }}/>
      </div>
      <div style={{ padding: '0 32px' }}><div className="progress-bar" style={{ marginTop: 0, borderRadius: 0, height: 3 }}><div className="progress-fill" style={{ width: `${progress}%` }}/></div></div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '32px' }}>
        <div style={{ maxWidth: 760, width: '100%', textAlign: 'center', animation: 'fadeIn 0.4s ease' }} key={step}>
          <div style={{ fontSize: 72, marginBottom: 24, lineHeight: 1 }}>{current.icon}</div>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'rgba(249,115,22,0.12)', border: '1px solid rgba(249,115,22,0.3)', borderRadius: 100, padding: '8px 20px', marginBottom: 24 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent-orange)', animation: 'pulse 2s infinite' }}/>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, color: 'var(--accent-orange)', fontSize: 13, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{current.title}</span>
          </div>
          <div style={{ fontSize: 24, lineHeight: 1.55, color: 'var(--text-primary)', fontFamily: 'var(--font-display)', fontWeight: 400, marginBottom: 36 }}>{current.instruction}</div>

          {current.timer > 0 && (
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
              <div style={{ background: 'var(--bg-card)', border: `1px solid ${timeLeft === 0 ? 'rgba(249,115,22,0.5)' : 'var(--border)'}`, borderRadius: 20, padding: '20px 40px', display: 'flex', alignItems: 'center', gap: 24 }}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 48, fontWeight: 700, color: timeLeft === 0 ? 'var(--accent-orange)' : 'var(--text-primary)', animation: timeLeft > 0 && timerRunning ? 'timerTick 1s infinite' : 'none', minWidth: 140, textAlign: 'center' }}>
                  {timeLeft !== null ? fmtTime(timeLeft) : fmtTime(current.timer)}
                </div>
                <button className="btn btn-primary" style={{ padding: '12px 24px' }}
                  onClick={() => { if (timeLeft === 0) { setTimeLeft(current.timer); setTimerRunning(false); setJustFinished(false); } else setTimerRunning(r => !r); }}>
                  {timeLeft === 0 ? <><Icon name="refresh" size={16}/> Reset</> : timerRunning ? <><Icon name="pause" size={16}/> Pause</> : <><Icon name="play" size={16}/> Start Timer</>}
                </button>
              </div>
            </div>
          )}

          {justFinished && step < total - 1 && (
            <div className="step-advance-banner" style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 700, color: '#22c55e', marginBottom: 8 }}>✅ {lang === 'ar' ? 'انتهى المؤقت! هل أنت مستعد للخطوة التالية؟' : 'Timer done! Ready for the next step?'}</div>
              <button className="btn" style={{ background: 'rgba(34,197,94,0.2)', color: '#22c55e', border: '1px solid rgba(34,197,94,0.4)', padding: '12px 28px', margin: '0 auto' }} onClick={() => setStep(s => s + 1)}>
                {t('next', 'common')} <Icon name="arrow" size={18} color="#22c55e"/>
              </button>
            </div>
          )}
        </div>
      </div>

      <div style={{ padding: '20px 32px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button className="btn btn-ghost btn-lg" onClick={() => setStep(s => Math.max(0, s - 1))} disabled={step === 0} style={{ opacity: step === 0 ? 0.3 : 1 }}><Icon name="arrowLeft" size={20}/> Previous</button>
        <div style={{ display: 'flex', gap: 8 }}>
          {recipe.steps.map((_, i) => (
            <div key={i} onClick={() => setStep(i)} style={{ width: i === step ? 28 : 8, height: 8, borderRadius: 4, background: i === step ? 'var(--accent-orange)' : i < step ? 'rgba(249,115,22,0.4)' : 'rgba(255,255,255,0.12)', cursor: 'pointer', transition: 'all 0.3s ease' }}/>
          ))}
        </div>
        {step < total - 1 ? (
          <button className="btn btn-primary btn-lg" onClick={() => setStep(s => s + 1)}>Next Step <Icon name="arrow" size={20}/></button>
        ) : (
          <button className="btn btn-primary btn-lg" onClick={onExit} style={{ background: 'linear-gradient(135deg, #22c55e, #16a34a)' }}><Icon name="check" size={20}/> {t('finish', 'common')}!</button>
        )}
      </div>
    </div>
  );
};

            <div key={ing.id} style={{ display: 'grid', gridTemplateColumns: '1fr 140px 36px', gap: 8, marginBottom: 8 }}>
              <input className="input" value={ing.name} onChange={e => updateIngredient(ing.id, 'name', e.target.value)} placeholder={`Ingredient ${idx + 1}...`}/>
              <input className="input" value={ing.amount} onChange={e => updateIngredient(ing.id, 'amount', e.target.value)} placeholder="Amount..."/>
              <button className="btn-icon" style={{ padding: 8, flexShrink: 0 }} onClick={() => removeIngredient(ing.id)} disabled={ingredients.length === 1}><Icon name="trash" size={14} color="var(--accent-red)"/></button>
            </div>
          ))}
          <button className="btn btn-ghost" style={{ padding: '10px 16px', fontSize: 13, marginBottom: 20 }} onClick={addIngredient}><Icon name="plus" size={14}/> Add Ingredient</button>

          {/* Steps */}
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 700, color: 'var(--accent-orange)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>Steps</div>
          {steps.map((s, idx) => (
            <div key={s.id} className="card" style={{ padding: 14, marginBottom: 12 }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(249,115,22,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--accent-orange)', flexShrink: 0, marginTop: 2 }}>{idx + 1}</div>
                <input className="input" value={s.icon} onChange={e => updateStep(s.id, 'icon', e.target.value)} style={{ width: 50, textAlign: 'center', fontSize: 18, flexShrink: 0 }}/>
                <input className="input" value={s.title} onChange={e => updateStep(s.id, 'title', e.target.value)} placeholder="Step title..." style={{ flex: 1 }}/>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                  <input className="input" type="number" value={s.timer} onChange={e => updateStep(s.id, 'timer', e.target.value)} placeholder="Secs" style={{ width: 80 }}/>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 11, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>sec</span>
                </div>
                <button className="btn-icon" style={{ padding: 8, flexShrink: 0 }} onClick={() => removeStep(s.id)} disabled={steps.length === 1}><Icon name="trash" size={14} color="var(--accent-red)"/></button>
              </div>
              <textarea className="input" value={s.instruction} onChange={e => updateStep(s.id, 'instruction', e.target.value)} placeholder="Step instructions..." style={{ height: 72, resize: 'none' }}/>
            </div>
          ))}
          <button className="btn btn-ghost" style={{ padding: '10px 16px', fontSize: 13 }} onClick={addStep}><Icon name="plus" size={14}/> Add Step</button>
        </div>
        <div className="divider"/>
        <div style={{ padding: '16px 28px', display: 'flex', gap: 12 }}>
          <button className="btn btn-ghost" style={{ flex: 1 }} onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="save" size={18}/> Save Recipe</button>
        </div>
      </div>
    </div>
  );
};

// ─── RECIPES PAGE ──────────────────────────────────────────────────────────────
const RecipesPage = ({ recipes, setRecipes, onCook, favorites, toggleFav, lang, t, setSelectedRecipe }) => {
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('All');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const filtered = recipes.filter(r => (cat === 'All' || r.category === cat) && r.name.toLowerCase().includes(search.toLowerCase()));

  const handleSaveRecipe = (recipe) => {
    const updated = [...recipes, recipe];
    setRecipes(updated);
    LS.set('recipes_custom', updated.filter(r => r.custom));
  };
  const handleDeleteRecipe = (id) => {
    const updated = recipes.filter(r => r.id !== id);
    setRecipes(updated);
    LS.set('recipes_custom', updated.filter(r => r.custom));
    if (selected && selected.id === id) setSelected(null);
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }} className="scrollable hide-scroll fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)' }}>{t('title', 'recipes')}</div>
        <button className="btn btn-primary" style={{ padding: '12px 20px' }} onClick={() => setShowAdd(true)}><Icon name="plus" size={16}/> {t('addMyRecipe', 'recipes')}</button>
      </div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        <div style={{ flex: 1, position: 'relative' }}>
          <div style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}><Icon name="search" size={18}/></div>
          <input className="input" style={{ paddingLeft: 46 }} placeholder={t('searchRecipes', 'recipes')} value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 24, overflowX: 'auto', paddingBottom: 4 }} className="hide-scroll">
        {CATEGORIES.map(c => <div key={c} className={`chip ${cat === c ? 'active' : ''}`} onClick={() => setCat(c)}>{c}</div>)}
      </div>
      {filtered.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)', fontFamily: 'var(--font-display)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div>
          <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>{t('noRecipes', 'recipes')}</div>
          <div>{t('tryDifferent', 'recipes')}</div>
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
          {filtered.map((recipe, idx) => {
            const isFav = favorites.includes(recipe.id);
            return (
              <div key={recipe.id} className="card" style={{ cursor: 'pointer', animation: `fadeIn ${0.1 + idx * 0.05}s ease forwards`, overflow: 'visible' }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 12px 40px rgba(0,0,0,0.4)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}>
                <div style={{ height: 160, background: `linear-gradient(135deg, ${recipe.bgColor || '#1a1208'}, rgba(18,22,30,0.9))`, borderRadius: '20px 20px 0 0', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 72, position: 'relative' }} onClick={() => setSelected(recipe)}>
                  {recipe.emoji}
                  <button style={{ position: 'absolute', top: 12, right: 12, background: 'rgba(0,0,0,0.4)', border: 'none', borderRadius: 10, padding: 8, cursor: 'pointer', color: isFav ? 'var(--accent-orange)' : 'white', transition: 'all 0.2s' }} onClick={e => { e.stopPropagation(); toggleFav(recipe.id); }}>
                    <Icon name={isFav ? 'heartFill' : 'heart'} size={18} color={isFav ? 'var(--accent-orange)' : 'white'}/>
                  </button>
                  <div style={{ position: 'absolute', top: 12, left: 12, display: 'flex', gap: 6 }}>
                    <span className={`tag ${getDifficultyColor(recipe.difficulty)}`} style={{ fontSize: 11 }}>{recipe.difficulty}</span>
                    {recipe.custom && <span className="tag tag-blue" style={{ fontSize: 11 }}>{t('myRecipe', 'recipes')}</span>}
                  </div>
                </div>
                <div style={{ padding: '16px' }} onClick={() => setSelected(recipe)}>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>{recipe.name}</div>
                  <div style={{ display: 'flex', gap: 12, fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)', marginBottom: 10 }}>
                    <span>⏱ {recipe.time}{t('minutes', 'recipes')}</span><span>🔥 {recipe.calories} {t('calories', 'recipes')}</span>
                    <span style={{ marginLeft: 'auto', color: 'var(--accent-amber)' }}>⭐ {recipe.rating}</span>
                  </div>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    <span className={`tag ${getCategoryTag(recipe.category)}`} style={{ fontSize: 11 }}>{recipe.category}</span>
                    {recipe.tags.slice(0, 1).map(tag => <span key={tag} className="tag tag-orange" style={{ fontSize: 11 }}>{tag}</span>)}
                  </div>
                </div>
                <div style={{ padding: '0 16px 16px', display: 'flex', gap: 8 }}>
                  <button className="btn btn-primary" style={{ flex: 1, padding: '11px' }} onClick={() => onCook(recipe)}><Icon name="chef" size={16}/> {t('startCookingMode', 'recipes')}</button>
                  {recipe.custom && <button className="btn btn-danger" style={{ padding: '11px 14px' }} onClick={() => { if(window.confirm('Delete this recipe?')) handleDeleteRecipe(recipe.id); }}><Icon name="trash" size={14}/></button>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {selected && <RecipeModal recipe={selected} onClose={() => setSelected(null)} onCook={r => { onCook(r); setSelected(null); }} favorites={favorites} toggleFav={toggleFav}/>}
      {showAdd && <AddRecipeModal onClose={() => setShowAdd(false)} onSave={handleSaveRecipe}/>}
    </div>
  );
};

// ─── SHOPPING PAGE (with localStorage) ───────────────────────────────────────
const ShoppingPage = ({ lang, t }) => {
  const [items, setItems] = useState(() => LS.get('shopping', SHOPPING_LIST_DEFAULT));
  const [newItem, setNewItem] = useState('');
  const [qty, setQty] = useState('');
  const checkedCount = items.filter(i => i.checked).length;

  const save = (next) => { setItems(next); LS.set('shopping', next); };
  const addItem = () => {
    if (!newItem.trim()) return;
    save([...items, { id: Date.now(), name: newItem.trim(), qty: qty || '1', checked: false, category: 'Other' }]);
    setNewItem(''); setQty('');
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }} className="scrollable hide-scroll fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)' }}>{t('title', 'shopping')}</div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--text-muted)', marginTop: 4 }}>{checkedCount} {t('of', 'shopping')} {items.length} {t('itemsCollected', 'shopping')}</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {checkedCount > 0 && <button className="btn btn-ghost" style={{ padding: '10px 16px', fontSize: 13 }} onClick={() => save(items.filter(i => !i.checked))}>{t('clearDone', 'shopping')}</button>}
        </div>
      </div>
      <div className="progress-bar" style={{ marginBottom: 24 }}><div className="progress-fill" style={{ width: `${items.length > 0 ? (checkedCount / items.length) * 100 : 0}%` }}/></div>
      <div className="card" style={{ padding: '16px', marginBottom: 20, display: 'flex', gap: 10 }}>
        <input className="input" style={{ flex: 1 }} placeholder={t('addItem', 'shopping')} value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === 'Enter' && addItem()}/>
        <input className="input" style={{ width: 120 }} placeholder={t('addQty', 'shopping')} value={qty} onChange={e => setQty(e.target.value)}/>
        <button className="btn btn-primary" style={{ padding: '12px 20px', flexShrink: 0 }} onClick={addItem}><Icon name="plus" size={18}/></button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {items.map(item => (
          <div key={item.id} className="card" style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer', opacity: item.checked ? 0.6 : 1, transition: 'all 0.2s ease' }}
            onClick={() => save(items.map(i => i.id === item.id ? { ...i, checked: !i.checked } : i))}>
            <div className={`checkbox ${item.checked ? 'checked' : ''}`}>{item.checked && <Icon name="check" size={12} color="white"/>}</div>
            <div style={{ flex: 1, fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--text-primary)', textDecoration: item.checked ? 'line-through' : 'none' }}>{item.name}</div>
            <span className="tag tag-amber" style={{ fontSize: 12 }}>{item.qty}</span>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)', padding: '4px 10px', background: 'rgba(255,255,255,0.04)', borderRadius: 8 }}>{item.category}</span>
            <button className="btn-icon" style={{ padding: 8 }} onClick={e => { e.stopPropagation(); save(items.filter(i => i.id !== item.id)); }}><Icon name="trash" size={14} color="var(--accent-red)"/></button>
          </div>
        ))}
      </div>
      {items.length === 0 && (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)', fontFamily: 'var(--font-display)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🛒</div>
          <div style={{ fontSize: 18, fontWeight: 600 }}>{t('listEmpty', 'shopping')}</div>
          <div>{t('addItemsAbove', 'shopping')}</div>
        </div>
      )}
    </div>
  );
};

// ─── INVENTORY PAGE (with localStorage) ──────────────────────────────────────
const InventoryPage = ({ lang, t }) => {
  const [items, setItems] = useState(() => LS.get('inventory', INVENTORY_ITEMS_DEFAULT));
  const [newName, setNewName] = useState('');
  const [newQty, setNewQty] = useState('');
  const [newUnit, setNewUnit] = useState('pcs');
  const [newCat, setNewCat] = useState('Pantry');
  const today = new Date();

  const save = (next) => { setItems(next); LS.set('inventory', next); };

  const addItem = () => {
    if (!newName.trim()) return;
    const expiry = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    const emojis = { Dairy: '🥛', Pantry: '🫙', Produce: '🥦', Protein: '🥩', Frozen: '🧊', Bakery: '🍞', Other: '🥘' };
    save([...items, { id: Date.now(), name: newName.trim(), qty: parseFloat(newQty) || 1, unit: newUnit, expires: expiry, emoji: emojis[newCat] || '🥘', category: newCat }]);
    setNewName(''); setNewQty('');
  };

  const getExpiry = (dateStr) => {
    const d = new Date(dateStr), diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
    if (diff < 0) return { label: 'Expired', cls: 'tag-red' };
    if (diff <= 3) return { label: `${diff}d left`, cls: 'tag-red' };
    if (diff <= 7) return { label: `${diff}d left`, cls: 'tag-amber' };
    return { label: `${diff}d left`, cls: 'tag-green' };
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }} className="scrollable hide-scroll fade-in">
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 20 }}>
        {t('title', 'inventory')} <span style={{ fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--text-muted)', marginLeft: 8 }}>{items.length} {t('items', 'inventory')}</span>
      </div>
      <div className="card" style={{ padding: '16px', marginBottom: 20 }}>
        <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
          <input className="input" style={{ flex: 1 }} placeholder={t('ingredientName', 'inventory')} value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addItem()}/>
          <input className="input" style={{ width: 90 }} placeholder={t('qty', 'inventory')} value={newQty} onChange={e => setNewQty(e.target.value)} type="number"/>
          <input className="input" style={{ width: 80 }} placeholder={t('unit', 'inventory')} value={newUnit} onChange={e => setNewUnit(e.target.value)}/>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <select className="input" style={{ flex: 1 }} value={newCat} onChange={e => setNewCat(e.target.value)}>
            {['Dairy','Pantry','Produce','Protein','Frozen','Bakery','Other'].map(c => <option key={c}>{c}</option>)}
          </select>
          <button className="btn btn-primary" style={{ padding: '12px 24px' }} onClick={addItem}><Icon name="plus" size={18}/> {t('add', 'common')}</button>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
        {items.map((item, idx) => {
          const exp = getExpiry(item.expires);
          return (
            <div key={item.id} className="card" style={{ padding: '18px 20px', display: 'flex', gap: 14, alignItems: 'center', animation: `fadeIn ${0.1 + idx * 0.04}s ease` }}>
              <div style={{ fontSize: 36, width: 52, height: 52, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(255,255,255,0.04)', borderRadius: 12 }}>{item.emoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>{item.name}</div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--accent-amber)' }}>{item.qty} {item.unit}</span>
                  <span className={`tag ${exp.cls}`} style={{ fontSize: 11 }}>{exp.label}</span>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)' }}>{item.category}</span>
                </div>
              </div>
              <button className="btn-icon" style={{ padding: 8 }} onClick={() => save(items.filter(i => i.id !== item.id))}><Icon name="trash" size={14} color="var(--accent-red)"/></button>
            </div>
          );
        })}
      </div>
      {items.length === 0 && (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)', fontFamily: 'var(--font-display)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
          <div style={{ fontSize: 18, fontWeight: 600 }}>{t('inventoryEmpty', 'inventory')}</div>
          <div>{t('addIngredients', 'inventory')}</div>
        </div>
      )}
    </div>
  );
};

const AIPage = ({ lang, t }) => {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
  const send = (msg) => {
    const text = msg || input.trim();
    if (!text || loading) return;
    setInput('');
    setMessages(prev => [...prev, { role: 'user', text }]);
    setLoading(true);
    setTimeout(() => { setMessages(prev => [...prev, { role: 'assistant', text: getAIResponse(text, lang) }]); setLoading(false); }, 800 + Math.random() * 500);
  };
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '24px 32px 0', overflow: 'hidden' }} className="fade-in">
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 16 }}>
        {t('title', 'ai')}
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginLeft: 12, verticalAlign: 'middle', fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 600, color: '#22c55e', background: 'rgba(34,197,94,0.1)', padding: '4px 12px', borderRadius: 100 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#22c55e', animation: 'pulse 2s infinite' }}/> {t('online', 'ai')}
        </span>
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
        {getSuggestedPrompts(lang).map(p => <button key={p} className="chip" style={{ fontSize: 12 }} onClick={() => send(p)}>{p}</button>)}
      </div>
      <div style={{ flex: 1, overflowY: 'auto', marginBottom: 16 }} className="scrollable hide-scroll">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, paddingBottom: 8 }}>
          {messages.map((msg, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
              {msg.role === 'assistant' && (<div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg, var(--accent-orange), #ea580c)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginRight: 10, flexShrink: 0, fontSize: 18 }}>🤖</div>)}
              <div className={`chat-bubble ${msg.role}`} style={{ whiteSpace: 'pre-wrap', lineHeight: 1.6 }}>{msg.text}</div>
            </div>
          ))}
          {loading && (<div style={{ display: 'flex', gap: 10 }}><div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg, var(--accent-orange), #ea580c)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>🤖</div><div className="chat-bubble assistant" style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/></div></div>)}
          <div ref={bottomRef}/>
        </div>
      </div>
      <div style={{ paddingBottom: 24, display: 'flex', gap: 10 }}>
        <input className="input" style={{ flex: 1 }} placeholder={t('placeholder', 'ai')} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()}/>
        <button className="btn btn-primary" style={{ padding: '12px 20px' }} onClick={() => send()}><Icon name="send" size={18}/></button>
      </div>
    </div>
  );
};

const TimersPage = ({ lang, t }) => {
  const [newName, setNewName] = useState('');
  const [newMins, setNewMins] = useState('');
  const [timers, setTimers] = useState([]);
  const addTimer = (secs, name) => {
    setTimers(prev => [...prev, { id: Date.now(), name, secs, startedAt: Date.now() }]);
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }} className="scrollable hide-scroll fade-in">
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 20 }}>{t('title', 'timers')}</div>
      <div className="card" style={{ padding: '16px', marginBottom: 16, display: 'flex', gap: 10 }}>
        <input className="input" placeholder={t('timerName', 'timers')} value={newName} onChange={e => setNewName(e.target.value)} style={{ flex: 1 }}/>
        <input className="input" type="number" placeholder={t('minutes', 'timers')} value={newMins} onChange={e => setNewMins(e.target.value)} style={{ width: 130 }}/>
        <button className="btn btn-primary" style={{ padding: '12px 20px', flexShrink: 0 }} onClick={() => { if (newMins) { addTimer(parseInt(newMins) * 60, newName); setNewName(''); setNewMins(''); } }}><Icon name="plus" size={18}/> {t('add', 'timers')}</button>
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 24 }}>
        {getPresets(lang).map(p => <button key={p.label} className="chip" onClick={() => addTimer(p.secs, p.label + ' ' + t('timer', 'timers'))}><Icon name="plus" size={12}/> {p.label}</button>)}
      </div>
      {timers.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)', fontFamily: 'var(--font-display)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>⏱</div><div style={{ fontSize: 18, fontWeight: 600 }}>{t('noTimers', 'timers')}</div><div>{t('addPreset', 'timers')}</div>
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
          {timers.map(timer => <TimerCard key={timer.id} timer={timer} onDelete={() => setTimers(prev => prev.filter(x => x.id !== timer.id))}/>)}
        </div>
      )}
    </div>
  );
};

              <span style={{ fontSize: 20 }}>{icon}</span>
              <div><div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{title}</div><div style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)' }}>{desc}</div></div>
            </div>
          ))}
        </div>
        <button className="btn btn-primary" style={{ width: '100%' }} onClick={onClose}>Close</button>
      </div>
    </div>
  </div>
);

// ─── DATA PRIVACY MODAL ─────────────────────────────────────────────────────────
const PrivacyModal = ({ onClose }) => {
  const clearAll = () => {
    if (window.confirm('This will clear all your saved data (recipes, shopping list, inventory). Are you sure?')) {
      ['shopping', 'inventory', 'favorites', 'settings', 'profile', 'recipes_custom'].forEach(k => localStorage.removeItem('kitchenos_' + k));
      alert('All data cleared. Refresh the page to reset.');
    }
  };
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal show" style={{ maxWidth: 440 }}>
        <div style={{ padding: '24px 28px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 800, color: 'var(--text-primary)' }}>Data & Privacy</div>
          <button className="btn-icon" onClick={onClose}><Icon name="x" size={18}/></button>
        </div>
        <div style={{ padding: '20px 28px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ padding: '16px', borderRadius: 12, background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.2)' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: '#22c55e', marginBottom: 4 }}>🔒 Your data is private</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>All data is stored locally on your device using localStorage. Nothing is sent to any server. KitchenOS works completely offline.</div>
          </div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
            <b style={{ color: 'var(--text-primary)' }}>What we store:</b> Shopping list, inventory, favorite recipes, custom recipes, settings and profile.
          </div>
          <button className="btn btn-danger" onClick={clearAll} style={{ padding: '14px' }}>🗑️ Clear All Data</button>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
};

// ─── SETTINGS PAGE ─────────────────────────────────────────────────────────────
const SettingsPage = ({ lang, t, setLang }) => {
  const [settings, setSettings] = useState(() => LS.get('settings', { darkMode: true, voice: false, notifications: true, fullscreen: false, tabletMode: true }));
  const [profile, setProfile] = useState(() => LS.get('profile', { name: 'Chef Alex', emoji: '👨‍🍳', bio: 'Your personal kitchen OS' }));
  const [voiceStatus, setVoiceStatus] = useState('idle'); // idle | listening | error
  const [activeModal, setActiveModal] = useState(null);

  const applyDarkMode = (dark) => {
    const root = document.documentElement;
    if (dark) {
      root.style.setProperty('--bg-primary', '#0d0f12');
      root.style.setProperty('--bg-secondary', '#13161b');
      root.style.setProperty('--bg-card', '#181c23');
      root.style.setProperty('--bg-card-hover', '#1e2330');
      root.style.setProperty('--text-primary', '#f1f5f9');
      root.style.setProperty('--text-secondary', '#94a3b8');
      root.style.setProperty('--text-muted', '#475569');
      root.style.setProperty('--border', 'rgba(255,255,255,0.06)');
    } else {
      root.style.setProperty('--bg-primary', '#f8fafc');
      root.style.setProperty('--bg-secondary', '#f1f5f9');
      root.style.setProperty('--bg-card', '#ffffff');
      root.style.setProperty('--bg-card-hover', '#f8fafc');
      root.style.setProperty('--text-primary', '#0f172a');
      root.style.setProperty('--text-secondary', '#475569');
      root.style.setProperty('--text-muted', '#94a3b8');
      root.style.setProperty('--border', 'rgba(0,0,0,0.08)');
    }
  };

  const toggle = (key) => {
    const next = { ...settings, [key]: !settings[key] };
    setSettings(next);
    LS.set('settings', next);

    if (key === 'darkMode') {
      applyDarkMode(next.darkMode);
    }
    if (key === 'fullscreen') {
      if (next.fullscreen) {
        document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
      } else {
        document.exitFullscreen?.() || document.webkitExitFullscreen?.();
      }
    }
    if (key === 'voice') {
      if (next.voice) {
        startVoice();
      } else {
        setVoiceStatus('idle');
      }
    }
    if (key === 'notifications') {
      if (next.notifications && 'Notification' in window) {
        Notification.requestPermission();
      }
    }
  };

  const startVoice = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice recognition is not supported in this browser. Try Chrome or Edge.'); return; }
    const recognition = new SR();
    recognition.continuous = false;
    recognition.lang = lang === 'ar' ? 'ar-EG' : 'en-US';
    recognition.interimResults = false;
    recognition.onstart = () => setVoiceStatus('listening');
    recognition.onend = () => setVoiceStatus('idle');
    recognition.onerror = () => setVoiceStatus('error');
    recognition.onresult = (e) => {
      const cmd = e.results[0][0].transcript.toLowerCase();
      let response = '';
      if (cmd.includes('recipe') || cmd.includes('cook')) response = 'Navigate to Recipes page to find your recipes!';
      else if (cmd.includes('shop') || cmd.includes('shopping')) response = 'Your shopping list is in the Shopping tab!';
      else if (cmd.includes('timer')) response = 'Go to Timers to set a kitchen timer!';
      else if (cmd.includes('inventory')) response = 'Check your Inventory to see what you have!';
      else response = `Voice command received: "${e.results[0][0].transcript}"`;
      alert('🎙️ ' + response);
      setVoiceStatus('idle');
    };
    try { recognition.start(); } catch(e) { setVoiceStatus('error'); }
  };

  // Apply dark mode on mount based on saved settings
  useEffect(() => { applyDarkMode(settings.darkMode); }, []);

  const Toggle = ({ val, onToggle }) => (
    <div onClick={onToggle} style={{ width: 52, height: 28, borderRadius: 14, background: val ? 'var(--accent-orange)' : 'rgba(255,255,255,0.12)', cursor: 'pointer', position: 'relative', transition: 'background 0.3s ease', flexShrink: 0 }}>
      <div style={{ position: 'absolute', top: 4, left: val ? 28 : 4, width: 20, height: 20, borderRadius: '50%', background: 'white', transition: 'left 0.3s ease', boxShadow: '0 2px 6px rgba(0,0,0,0.3)' }}/>
    </div>
  );

  const rows = [
    { key: 'darkMode', labelKey: 'darkMode', descKey: 'darkModeDesc', icon: '🌙' },
    { key: 'voice', labelKey: 'voiceCommands', descKey: 'voiceCommandsDesc', icon: '🎙️' },
    { key: 'notifications', labelKey: 'timerAlerts', descKey: 'timerAlertsDesc', icon: '🔔' },
    { key: 'tabletMode', labelKey: 'tabletMode', descKey: 'tabletModeDesc', icon: '📱' },
    { key: 'fullscreen', labelKey: 'fullscreen', descKey: 'fullscreenDesc', icon: '⛶' },
  ];

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }} className="scrollable hide-scroll fade-in">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--text-primary)' }}>{t('title', 'settings')}</div>
        {voiceStatus === 'listening' && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 16px', borderRadius: 20, background: 'rgba(249,115,22,0.15)', border: '1px solid rgba(249,115,22,0.4)' }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent-orange)', animation: 'pulse 1s infinite' }}/>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--accent-orange)', fontWeight: 600 }}>🎙️ Listening...</span>
          </div>
        )}
        {voiceStatus === 'error' && (
          <div style={{ padding: '8px 16px', borderRadius: 20, background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--accent-red)' }}>
            ❌ Voice not supported
          </div>
        )}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>
        <div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 700, color: 'var(--accent-orange)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>{t('preferences', 'settings')}</div>
          <div className="card" style={{ overflow: 'hidden' }}>
            <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14, borderBottom: '1px solid var(--border)' }}>
              <div style={{ fontSize: 24, width: 40, textAlign: 'center' }}>🌐</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 2 }}>{t('language', 'settings')}</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)' }}>Choose your preferred language</div>
              </div>
              <select className="input" value={lang} onChange={(e) => setLang(e.target.value)} style={{ width: 120, padding: '8px 12px', fontSize: 14 }}>
                <option value="en">English</option>
                <option value="ar">العربية</option>
              </select>
            </div>
            {rows.map((row) => (
              <div key={row.key}>
                <div className="divider"/>
                <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ fontSize: 24, width: 40, textAlign: 'center' }}>{row.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 600, color: 'var(--text-primary)' }}>{t(row.labelKey, 'settings')}</div>
                    <div style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)' }}>{t(row.descKey, 'settings')}</div>
                  </div>
                  <Toggle val={settings[row.key]} onToggle={() => toggle(row.key)}/>
                </div>
              </div>
            ))}
          </div>

          {/* Voice Command Button */}
          {settings.voice && (
            <button className="btn btn-primary" style={{ width: '100%', marginTop: 12, padding: '14px' }} onClick={startVoice}>
              <Icon name="mic" size={18}/> {voiceStatus === 'listening' ? '🎙️ Listening...' : 'Tap to Speak'}
            </button>
          )}
        </div>
        <div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 700, color: 'var(--accent-orange)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>{t('account', 'settings')}</div>
          <div className="card" style={{ padding: '20px', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 16 }}>
              <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent-orange), #ea580c)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>{profile.emoji}</div>
              <div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)' }}>{profile.name}</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--text-muted)' }}>{profile.bio}</div>
              </div>
            </div>
            <div className="divider" style={{ marginBottom: 16 }}/>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {[
                { key: 'editProfile', label: t('editProfile', 'settings'), action: () => setActiveModal('profile') },
                { key: 'connectedDevices', label: t('connectedDevices', 'settings'), action: () => setActiveModal('devices') },
                { key: 'dataPrivacy', label: t('dataPrivacy', 'settings'), action: () => setActiveModal('privacy') },
                { key: 'about', label: t('about', 'settings'), action: () => setActiveModal('about') }
              ].map(item => (
                <div key={item.key} style={{ padding: '12px 14px', borderRadius: 10, background: 'rgba(255,255,255,0.04)', fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--text-secondary)', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'all 0.2s' }}
                  onClick={item.action}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.08)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}>
                  {item.label}<Icon name="arrow" size={14} color="var(--text-muted)"/>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{ padding: '16px 20px' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--text-muted)', marginBottom: 4 }}>KitchenOS v3.0 — Egyptian Edition</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 12, color: 'var(--text-muted)' }}>🇪🇬 Built with love for Egyptian cooking</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 11, color: 'var(--accent-orange)', marginTop: 8 }}>✅ Inventory & Shopping List auto-save</div>
          </div>
        </div>
      </div>
      {activeModal === 'profile' && <ProfileModal onClose={() => setActiveModal(null)} profile={profile} setProfile={setProfile}/>}
      {activeModal === 'devices' && <DevicesModal onClose={() => setActiveModal(null)}/>}
      {activeModal === 'privacy' && <PrivacyModal onClose={() => setActiveModal(null)}/>}
      {activeModal === 'about' && <AboutModal onClose={() => setActiveModal(null)}/>}
    </div>
  );
};

// ─── APP SHELL ─────────────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState('home');
  const [cookingRecipe, setCookingRecipe] = useState(null);
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [favorites, setFavorites] = useState(() => LS.get('favorites', [1, 8]));
  const [lang, setLang] = useState(() => LS.get('language', 'en'));
  const [recipes, setRecipes] = useState(() => {
    const custom = LS.get('recipes_custom', []);
    return [...DEFAULT_RECIPES, ...custom];
  });

  // Lock background scroll when modal is open
  useEffect(() => {
    if (selectedRecipe || cookingRecipe) {
      document.body.classList.add('modal-open');
    } else {
      document.body.classList.remove('modal-open');
    }
    return () => {
      document.body.classList.remove('modal-open');
    };
  }, [selectedRecipe, cookingRecipe]);

  // Save language to localStorage when it changes
  useEffect(() => {
    LS.set('language', lang);
  }, [lang]);

  const toggleFav = (id) => {
    const next = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
    setFavorites(next);
    LS.set('favorites', next);
  };

  const t = (key, section = 'common') => {
    return TRANSLATIONS[lang]?.[section]?.[key] || TRANSLATIONS.en[section]?.[key] || key;
  };

  const navItems = [
    { id: 'home', icon: 'home', labelKey: 'home' },
    { id: 'recipes', icon: 'book', labelKey: 'recipes' },
    { id: 'shopping', icon: 'cart', labelKey: 'shopping' },
    { id: 'inventory', icon: 'box', labelKey: 'inventory' },
    { id: 'ai', icon: 'bot', labelKey: 'ai' },
    { id: 'timers', icon: 'timer', labelKey: 'timers' },
    { id: 'settings', icon: 'settings', labelKey: 'settings' },
  ];

  return (
    <div dir={lang === 'ar' ? 'rtl' : 'ltr'} style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: 'var(--bg-primary)', fontFamily: lang === 'ar' ? "'Noto Sans Arabic', var(--font-display)" : 'var(--font-display)' }}>
      <div style={{ height: 64, background: 'var(--bg-secondary)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 24px', justifyContent: 'space-between', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg, var(--accent-orange), #ea580c)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, boxShadow: '0 4px 12px rgba(249,115,22,0.4)' }}>🇪🇬</div>
          <div>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 17, color: 'var(--text-primary)', lineHeight: 1.1 }}>KitchenOS</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--accent-orange)', letterSpacing: '0.15em' }}>EGYPTIAN SMART KITCHEN</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 4 }}>
          {navItems.map(nav => (
            <div key={nav.id} className={`nav-item ${page === nav.id ? 'active' : ''}`} onClick={() => setPage(nav.id)}>
              <Icon name={nav.icon} size={20} color={page === nav.id ? 'var(--accent-orange)' : 'currentColor'}/>
              {t(nav.labelKey, 'nav')}
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button className="btn-icon" title="Fullscreen" onClick={() => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
            } else {
              document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
          }}>
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M16 21h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-display)', fontSize: 13, color: 'var(--text-muted)', background: 'rgba(255,255,255,0.04)', padding: '6px 14px', borderRadius: 20, border: '1px solid var(--border)' }}>
            💾 Auto-saved
          </div>
        </div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {page === 'home' && <HomePage setPage={setPage} recipes={recipes} favorites={favorites} lang={lang} t={t}/>}
        {page === 'recipes' && <RecipesPage recipes={recipes} setRecipes={setRecipes} onCook={r => setCookingRecipe(r)} favorites={favorites} toggleFav={toggleFav} lang={lang} t={t} setSelectedRecipe={setSelectedRecipe}/>}
        {page === 'shopping' && <ShoppingPage lang={lang} t={t}/>}
        {page === 'inventory' && <InventoryPage lang={lang} t={t}/>}
        {page === 'ai' && <AIPage lang={lang} t={t}/>}
        {page === 'timers' && <TimersPage lang={lang} t={t}/>}
        {page === 'settings' && <SettingsPage lang={lang} t={t} setLang={setLang}/>}
      </div>
      {selectedRecipe && <RecipeModal recipe={selectedRecipe} onClose={() => setSelectedRecipe(null)} onCook={r => { setCookingRecipe(r); setSelectedRecipe(null); }} favorites={favorites} toggleFav={toggleFav} lang={lang} t={t}/>}
      {cookingRecipe && <CookingMode recipe={cookingRecipe} onExit={() => setCookingRecipe(null)} lang={lang} t={t}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
